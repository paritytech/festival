# Manually deploy both SPAs to their DotNS domains on paseo-next-v2.
#
# Trigger: Actions → "Deploy" → Run workflow.
#
# Config lives in .github/env.paseo-next-v2 (domains + contract addresses).
# Required repo secret: DOTNS_MNEMONIC (owner of the DotNS domains).
#
# Neither SPA is registered in the public Publisher registry here — that only
# happens for the attendee app on a tagged release (see release.yml).
name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  admin:
    name: Admin
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: admin
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # Same publisher account as admin → run after it to avoid a nonce race.
  attendee:
    needs: admin
    name: Attendee
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: attendee
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
