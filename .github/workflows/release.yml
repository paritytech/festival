# Deploy both SPAs to paseo-next-v2 via the reusable _deploy.yml workflow.
#
#   push → main          → staging   (stg. domains,   nothing published)
#   release published    → production (base domains,  attendee published)
#
# Config (domains + contract addresses) lives in .github/env.paseo-next-v2.
# Required repo secret: DOTNS_MNEMONIC (owner of the DotNS domains).
name: Release

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  # ── Staging (push to main) ────────────────────────────────────────────
  # admin → attendee: one publisher account, so serialize to avoid a nonce race.
  staging-admin:
    if: github.event_name == 'push'
    name: Staging admin
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: admin
      domain-prefix: "stg."
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  staging-attendee:
    needs: staging-admin
    if: github.event_name == 'push'
    name: Staging attendee
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: attendee
      domain-prefix: "stg."
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Production (tagged release) ───────────────────────────────────────
  prod-admin:
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Production admin
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: admin
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # Attendee is the only app listed in the public Publisher registry, and only
  # on a tagged release.
  prod-attendee:
    needs: prod-admin
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Production attendee
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: attendee
      publish: true
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Post-deploy: append deployment info to the release notes ──────────
  post-deploy:
    needs: [prod-admin, prod-attendee]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    name: Update release notes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load contract addresses
        run: grep -v '^#' .github/env.paseo-next-v2 | grep -v '^$' >> $GITHUB_ENV

      - name: Update release with deployment info
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          # polkadot-app-deploy's `domain` output already includes the .dot suffix.
          ADMIN_DOMAIN: ${{ needs.prod-admin.outputs.domain }}
          ADMIN_CID: ${{ needs.prod-admin.outputs.cid }}
          ATTENDEE_DOMAIN: ${{ needs.prod-attendee.outputs.domain }}
          ATTENDEE_CID: ${{ needs.prod-attendee.outputs.cid }}
        run: |
          EXISTING=$(gh release view "$TAG" --json body -q .body)

          DEPLOY_INFO=$(cat <<EOF

          ---

          ### Deployment — paseo-next-v2 (${VITE_NETWORK})

          | App | Domain | CID |
          |-----|--------|-----|
          | **Admin** | \`${ADMIN_DOMAIN}\` | \`${ADMIN_CID}\` |
          | **Festival** | \`${ATTENDEE_DOMAIN}\` | \`${ATTENDEE_CID}\` |

          ### Contracts

          | Contract | Address |
          |----------|---------|
          | Festival | \`${VITE_FESTIVAL_ADDRESS}\` |
          | Festival POAP | \`${VITE_FESTIVAL_POAP_ADDRESS}\` |
          | Session POAP | \`${VITE_SUB_EVENT_POAP_ADDRESS}\` |
          | Multicall | \`${VITE_MULTICALL_ADDRESS}\` |
          EOF
          )

          gh release edit "$TAG" --notes "${EXISTING}${DEPLOY_INFO}"
