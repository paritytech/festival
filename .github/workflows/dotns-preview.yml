name: PR Preview

# Per-PR preview deploys of both SPAs to paseo-next-v2 via the reusable
# _deploy.yml workflow. Previews are never listed in the Publisher registry.
on:
  pull_request:

permissions:
  contents: read
  statuses: write
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Resolve the per-PR domain labels from the env file's base domains. The
  # pr<N>- prefix ends in a letter, so polkadot-app-deploy's trailing-digit
  # label truncation never kicks in and the full PR number is preserved.
  compute-label:
    runs-on: ubuntu-latest
    name: Compute preview label
    outputs:
      admin: ${{ steps.label.outputs.admin }}
      attendee: ${{ steps.label.outputs.attendee }}
    steps:
      - uses: actions/checkout@v4
      - id: label
        run: |
          set -a; source <(grep -v '^#' .github/env.paseo-next-v2 | grep -v '^$'); set +a
          PR="${{ github.event.pull_request.number }}"
          echo "admin=pr${PR}-${ADMIN_DOTNS_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "attendee=pr${PR}-${ATTENDEE_DOTNS_DOMAIN}" >> "$GITHUB_OUTPUT"

  comment-deploying:
    needs: compute-label
    runs-on: ubuntu-latest
    name: Comment deploying
    steps:
      - name: Comment deployment in progress
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-preview
          message: |
            ## Preview Deployment

            | App | Status | Domain |
            |:---:|:------:|:------:|
            | Admin | Deploying... | `${{ needs.compute-label.outputs.admin }}` |
            | Festival | Deploying... | `${{ needs.compute-label.outputs.attendee }}` |

            <sub>Deployment in progress. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>

  # admin → attendee: one publisher account, so serialize to avoid a nonce race.
  deploy-admin:
    name: Deploy admin preview
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: admin
      domain-prefix: "pr${{ github.event.pull_request.number }}-"
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-attendee:
    needs: deploy-admin
    name: Deploy festival preview
    uses: ./.github/workflows/_deploy.yml
    with:
      spa: attendee
      domain-prefix: "pr${{ github.event.pull_request.number }}-"
      publish: false
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  comment-success:
    needs: [deploy-admin, deploy-attendee]
    if: success()
    runs-on: ubuntu-latest
    name: Comment success
    steps:
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-preview
          message: |
            ## Preview Deployment Ready!

            | App | Domain |
            |:---:|:------:|
            | **Admin** | `${{ needs.deploy-admin.outputs.domain }}` |
            | **Festival** | `${{ needs.deploy-attendee.outputs.domain }}` |

            <details>
            <summary>Deployment Details</summary>

            | App | CID |
            |-----|-----|
            | Admin | `${{ needs.deploy-admin.outputs.cid }}` |
            | Festival | `${{ needs.deploy-attendee.outputs.cid }}` |

            | Info | Value |
            |------|-------|
            | **Commit** | [`${{ github.event.pull_request.head.sha }}`](${{ github.event.pull_request.head.repo.html_url }}/commit/${{ github.event.pull_request.head.sha }}) |
            | **Branch** | `${{ github.head_ref }}` |

            </details>

            ---
            <sub>Updates automatically on each push. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>

  comment-failure:
    needs: [deploy-admin, deploy-attendee]
    if: failure()
    runs-on: ubuntu-latest
    name: Comment failure
    steps:
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-preview
          message: |
            ## Preview Deployment Failed

            | Stage | Status |
            |:------|:------:|
            | **Deploy Admin** | ${{ needs.deploy-admin.result == 'success' && 'Deployed' || needs.deploy-admin.result == 'skipped' && 'Skipped' || 'Failed' }} |
            | **Deploy Festival** | ${{ needs.deploy-attendee.result == 'success' && 'Deployed' || needs.deploy-attendee.result == 'skipped' && 'Skipped' || 'Failed' }} |

            ---
            <sub>Fix issues and push again to retry. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
